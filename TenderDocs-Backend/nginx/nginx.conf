worker_processes auto;
events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    tcp_nopush    on;
    keepalive_timeout 65;

    # Allow large document uploads through the proxy.
    client_max_body_size 200m;

    # ---- Compression ----
    gzip              on;
    gzip_vary         on;
    gzip_comp_level   6;
    gzip_min_length   1024;
    gzip_proxied      any;
    gzip_types
        text/plain text/css text/javascript application/javascript
        application/json application/xml application/wasm
        image/svg+xml font/ttf font/otf font/woff font/woff2;

    # WebSocket upgrade mapping (HMR in dev, future realtime).
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream api_upstream      { server api:8080; }
    upstream frontend_upstream { server frontend:80; }

    server {
        listen 80;
        server_name _;

        # API behind /api
        location /api/ {
            proxy_pass         http://api_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        $connection_upgrade;
            proxy_request_buffering off;
            proxy_read_timeout 300s;
        }

        location /swagger/ {
            proxy_pass       http://api_upstream;
            proxy_set_header Host $host;
        }
        location = /swagger { return 301 /swagger/; }

        location /health {
            proxy_pass       http://api_upstream;
            proxy_set_header Host $host;
        }

        # Cache built static assets aggressively (filenames are content-hashed by Vite).
        location /assets/ {
            proxy_pass         http://frontend_upstream;
            proxy_set_header   Host $host;
            proxy_cache_valid  200 30d;
            expires            30d;
            add_header         Cache-Control "public, immutable";
        }

        # Everything else -> the existing frontend SPA
        location / {
            proxy_pass         http://frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection $connection_upgrade;
        }
    }
}
