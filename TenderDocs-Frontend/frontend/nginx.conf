server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Compression
    gzip              on;
    gzip_vary         on;
    gzip_comp_level   6;
    gzip_min_length   1024;
    gzip_types        text/plain text/css application/javascript application/json
                      image/svg+xml font/ttf font/otf font/woff font/woff2;

    # Content-hashed build assets — cache hard.
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # index.html references the content-hashed asset filenames, which change on every
    # deploy. It must never be cached, or a returning browser will keep requesting chunk
    # files from a previous build that no longer exist ("Failed to fetch dynamically
    # imported module"). Always revalidate so users get the current asset references.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires -1;
    }

    # SPA history fallback — every route returns index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
