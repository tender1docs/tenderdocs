# ---------------------------------------------------------------------------
# TenderDocs — single-server PRODUCTION stack (build on the server).
# Builds the API + SPA from source, runs Postgres, and fronts everything with
# Caddy, which gets a free HTTPS certificate for $DOMAIN automatically.
#
# Run from this deploy/ directory:
#   docker compose -f docker-compose.server.yml up -d --build
#
# Requires:
#   - a filled-in .env in this directory (see .env.example)
#   - DNS for $DOMAIN pointing at this host
#   - ports 80 and 443 open to the internet
# ---------------------------------------------------------------------------
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: ../TenderDocs-Backend
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      Swagger__Enabled: ${SWAGGER_ENABLED:-false}
      Seed__Enabled: ${SEED_ENABLED:-true}
      Seed__AdminEmail: ${SEED_ADMIN_EMAIL:-tender1docs@gmail.com}
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      Jwt__Secret: ${JWT_SECRET}
      Jwt__Issuer: ${JWT_ISSUER:-TenderDocs}
      Jwt__Audience: ${JWT_AUDIENCE:-TenderDocsClient}
      Encryption__Key: ${ENCRYPTION_KEY}
      Cors__AllowedOrigins__0: ${PUBLIC_URL}
      Google__ClientId: ${GOOGLE_CLIENT_ID:-}
      Google__ClientSecret: ${GOOGLE_CLIENT_SECRET:-}
      Google__RedirectUri: ${GOOGLE_REDIRECT_URI:-}
      Google__DriveFolderId: ${GOOGLE_DRIVE_FOLDER_ID:-}
      Google__DriveMasterFolderId: ${GOOGLE_DRIVE_MASTER_FOLDER_ID:-}
    volumes:
      - storage:/app/storage      # uploaded documents (LocalStorageProvider)
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ../TenderDocs-Frontend/frontend
      args:
        # Baked into the SPA at build time. VITE_GOOGLE_CLIENT_ID must be set in .env for the
        # "Sign in with Google" button to work in production.
        VITE_API_BASE_URL: /api
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - frontend
    restart: unless-stopped

volumes:
  pgdata:
  storage:
  caddy_data:
  caddy_config:
